apiVersion: v1
data:
  00001_init_schema.down.sql: |
    DROP TABLE IF EXISTS enrollments;
    DROP TABLE IF EXISTS courses;
    DROP TABLE IF EXISTS students;
  00001_init_schema.up.sql: |-
    CREATE TABLE IF NOT EXISTS courses (
        id UUID PRIMARY KEY,
        title VARCHAR(255) NOT NULL,
        duration INT NOT NULL,
        price INT NOT NULL
        );

    CREATE TABLE IF NOT EXISTS students (
        id UUID PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL
        );

    CREATE TABLE IF NOT EXISTS enrollments
    (
        student_id UUID REFERENCES students(id) ON DELETE CASCADE,
        course_id UUID REFERENCES courses(id) ON DELETE CASCADE,
        PRIMARY KEY (student_id, course_id)
    );
  00002_outbox_table.down.sql: |-
    DROP INDEX IF EXISTS idx_outbox_events_status;
    DROP TABLE IF EXISTS outbox_events;
  00002_outbox_table.up.sql: |-
    CREATE TABLE IF NOT EXISTS outbox_events (
                                                 id UUID PRIMARY KEY,
                                                 topic VARCHAR(255) NOT NULL,
                                                 payload JSONB NOT NULL,
                                                 status VARCHAR(50) NOT NULL DEFAULT 'pending',
                                                 created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX idx_outbox_events_status ON outbox_events(status) WHERE status = 'pending';
kind: ConfigMap
metadata:
  name: db-migrations
