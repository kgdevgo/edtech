name: Go Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./02_with_pg

    steps:
      - name: Downloading code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: ./02_with_pg/go.sum

      - name: Run linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: ./02_with_pg
          args: --config=./.golangci.yml

      - name: Run tests
        run: go test -v  -race ./...

      - name: Build
        run: go build -v ./cmd/api/main.go